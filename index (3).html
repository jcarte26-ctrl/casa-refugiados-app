<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0E5E5A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Casa Refugiados" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Casa Refugiados — Información y apoyo</title>

<!--
=====================================================================
  GUÍA RÁPIDA PARA EDITAR ESTA APLICACIÓN
=====================================================================
  1) HORARIO DE LA CASITA  →  se edita en Google Sheets, NO aquí.
     Sigue las instrucciones en la constante SHEET_CSV_URL (abajo).

  2) TEXTOS (legal, vivienda, salud, etc.)  →  se editan en el
     objeto CONTENIDO (abajo, en <script>). Cada texto tiene cuatro
     idiomas: es (español), en (inglés), fr (francés), ht (kreyòl).

  Los textos con  [ POR CONFIRMAR ]  son provisionales. Reemplázalos
  con información verificada por Casa Refugiados antes de publicar.
  Las traducciones (sobre todo fr y ht) deben revisarse con un
  hablante nativo antes de publicar.
=====================================================================
-->

<style>
  :root {
    --brand:#0E5E5A; --brand-deep:#0A3D3B; --brand-soft:#E3EDEC;
    --bg:#F4F2EC; --card:#FFFFFF; --line:#E4E0D6;
    --ink:#1B2522; --ink-soft:#586460; --ink-faint:#8A938F;
    --legal:#4E6478; --legal-soft:#E7ECF0;
    --vivienda:#BC6B4C; --vivienda-soft:#F4E6DF;
    --comunidad:#C98A3A; --comunidad-soft:#F6ECD9;
    --salud:#5C8A6B; --salud-soft:#E5EFE8;
    --orientacion:#6B6597; --orientacion-soft:#EAE9F1;
    --accent:#E8943C;
    --radius:18px; --radius-sm:12px;
    --shadow:0 1px 2px rgba(27,37,34,.05),0 8px 24px rgba(27,37,34,.06);
    --shadow-press:0 1px 2px rgba(27,37,34,.08);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}

  .app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;position:relative;box-shadow:0 0 60px rgba(27,37,34,.07);}

  .topbar{background:linear-gradient(160deg,var(--brand) 0%,var(--brand-deep) 100%);color:#fff;padding:calc(env(safe-area-inset-top) + 18px) 20px 18px;position:sticky;top:0;z-index:20;}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .brand-name{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px;}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:#fff;display:grid;place-items:center;flex:none;overflow:hidden;}
  .brand-mark img{width:30px;height:30px;object-fit:contain;}
  .topbar-actions{display:flex;align-items:center;gap:8px;}
  .pill{font-size:.72rem;font-weight:700;letter-spacing:.04em;background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:999px;padding:6px 11px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:var(--font);}
  .pill:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  .icon-btn{width:38px;height:38px;border-radius:11px;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:grid;place-items:center;}
  .icon-btn:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  .tagline{margin-top:6px;font-size:.9rem;color:rgba(255,255,255,.82);}

  .lang-menu{position:absolute;top:calc(env(safe-area-inset-top) + 58px);right:18px;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(27,37,34,.22);overflow:hidden;z-index:40;display:none;min-width:190px;border:1px solid var(--line);}
  .lang-menu.open{display:block;animation:rise .16s ease both;}
  .lang-menu button{display:flex;width:100%;gap:10px;align-items:center;padding:13px 16px;border:none;background:none;font-family:var(--font);font-size:.98rem;cursor:pointer;text-align:left;color:var(--ink);border-top:1px solid var(--line);}
  .lang-menu button:first-child{border-top:none;}
  .lang-menu button:hover{background:var(--bg);}
  .lang-menu button[aria-current="true"]{font-weight:700;color:var(--brand);}
  .lang-menu .tick{margin-left:auto;color:var(--brand);}

  .view{flex:1;padding:22px 18px 28px;animation:rise .28s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){.view,.lang-menu.open{animation:none;}*{transition:none !important;}}

  .home-logo{display:block;width:138px;max-width:55%;height:auto;margin:6px auto 14px;}
  .greeting{font-size:1.42rem;font-weight:700;letter-spacing:-.02em;line-height:1.25;margin:4px 2px;}
  .subgreeting{color:var(--ink-soft);margin:0 2px 18px;font-size:.96rem;}

  .cards{display:grid;gap:13px;}
  .card{display:flex;align-items:center;gap:15px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s ease,box-shadow .12s ease;color:var(--ink);position:relative;overflow:hidden;font-family:var(--font);text-decoration:none;}
  .card:active{transform:scale(.985);box-shadow:var(--shadow-press);}
  .card:focus-visible{outline:3px solid var(--brand);outline-offset:2px;}
  .card-bar{position:absolute;left:0;top:0;bottom:0;width:5px;}
  .card-icon{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;flex:none;}
  .card-icon svg{width:27px;height:27px;}
  .card-text{flex:1;min-width:0;}
  .card-title{display:block;font-weight:700;font-size:1.08rem;letter-spacing:-.01em;line-height:1.3;}
  .card-desc{display:block;color:var(--ink-soft);font-size:.87rem;line-height:1.4;margin-top:3px;}
  .card-chev{color:var(--ink-faint);flex:none;}

  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-soft);font-size:.95rem;font-weight:600;cursor:pointer;padding:4px 2px;margin:-2px 0 14px -2px;font-family:var(--font);}
  .back:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:6px;}

  .section-head{display:flex;align-items:center;gap:13px;margin-bottom:6px;}
  .section-badge{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;flex:none;}
  .section-badge svg{width:25px;height:25px;}
  .section-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;line-height:1.15;}
  .section-intro{color:var(--ink-soft);font-size:.97rem;margin:12px 2px 20px;}

  .block{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:17px 16px;margin-bottom:13px;box-shadow:var(--shadow);}
  .block-label{font-size:.74rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px;}
  .block h3{margin:0 0 7px;font-size:1.06rem;letter-spacing:-.01em;}
  .block p{margin:0 0 8px;color:var(--ink-soft);font-size:.95rem;}
  .block p:last-child{margin-bottom:0;}

  .steps{list-style:none;counter-reset:s;padding:0;margin:4px 0 0;}
  .steps li{counter-increment:s;display:flex;gap:12px;padding:9px 0;border-top:1px solid var(--line);align-items:flex-start;}
  .steps li:first-child{border-top:none;}
  .steps li::before{content:counter(s);flex:none;width:26px;height:26px;border-radius:50%;background:var(--seccolor,var(--brand));color:#fff;font-size:.82rem;font-weight:700;display:grid;place-items:center;margin-top:1px;}
  .steps li span{font-size:.95rem;color:var(--ink);padding-top:2px;}

  .todo{display:inline-block;font-size:.72rem;font-weight:800;letter-spacing:.04em;color:#9A5B00;background:#FBEFD6;border:1px dashed #E0B25C;border-radius:6px;padding:2px 7px;margin-bottom:6px;}

  .contact-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line);}
  .contact-row:first-of-type{border-top:none;}
  .contact-ico{width:38px;height:38px;border-radius:11px;background:var(--brand-soft);color:var(--brand);display:grid;place-items:center;flex:none;}
  .contact-ico svg{width:19px;height:19px;}
  .contact-meta{flex:1;min-width:0;}
  .contact-meta .k{display:block;font-size:.78rem;color:var(--ink-faint);margin-bottom:2px;}
  .contact-meta .v{display:block;font-weight:600;font-size:.96rem;line-height:1.4;}

  .sched-status{display:flex;align-items:center;justify-content:center;gap:7px;font-size:.8rem;color:var(--ink-faint);margin:0 0 14px;}
  .sched-status .d{width:8px;height:8px;border-radius:50%;flex:none;}
  .sched-status.live .d{background:var(--salud);}
  .sched-status.cached .d{background:var(--accent);}
  .sched-status.loading .d{background:var(--ink-faint);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

  .day{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow);}
  .day-head{background:var(--comunidad-soft);color:#7A521A;font-weight:800;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase;padding:9px 14px;}
  .day-empty{padding:12px 14px;color:var(--ink-faint);font-size:.9rem;font-style:italic;}
  .slot{display:flex;gap:13px;padding:11px 14px;border-top:1px solid var(--line);}
  .slot:first-of-type{border-top:none;}
  .slot-time{font-weight:700;font-size:.86rem;color:var(--comunidad);white-space:nowrap;padding-top:1px;min-width:60px;}
  .slot-body{display:flex;flex-direction:column;}
  .slot-body .t{font-weight:600;font-size:.96rem;line-height:1.3;}
  .slot-body .p{font-size:.85rem;color:var(--ink-soft);line-height:1.35;margin-top:2px;}
  .updated-note{font-size:.82rem;color:var(--ink-faint);text-align:center;margin:4px 0 0;}

  .privacy{margin:8px 2px 0;display:flex;gap:10px;align-items:flex-start;background:var(--brand-soft);border-radius:var(--radius-sm);padding:13px 14px;}
  .privacy svg{width:20px;height:20px;color:var(--brand);flex:none;margin-top:1px;}
  .privacy p{margin:0;font-size:.85rem;color:var(--brand-deep);line-height:1.45;}

  .scrim{position:fixed;inset:0;background:rgba(15,25,23,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .scrim.open{display:flex;}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom) + 22px);animation:sheetUp .26s ease both;}
  @keyframes sheetUp{from{transform:translateY(100%);}to{transform:none;}}
  .sheet h3{margin:0 0 4px;font-size:1.2rem;}
  .sheet>p{margin:0 0 16px;color:var(--ink-soft);font-size:.92rem;}
  .call-btn{display:flex;align-items:center;gap:13px;width:100%;text-decoration:none;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;color:var(--ink);font-family:var(--font);}
  .call-btn .ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none;color:#fff;}
  .call-btn .lab .k{display:block;font-size:.8rem;color:var(--ink-faint);margin-bottom:1px;}
  .call-btn .lab .v{display:block;font-weight:700;font-size:1.05rem;}
  .sheet-close{width:100%;background:var(--brand);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-weight:700;font-size:1rem;cursor:pointer;margin-top:4px;font-family:var(--font);}

  .footer{text-align:center;font-size:.76rem;color:var(--ink-faint);padding:18px 18px 6px;}
  .offline-dot{display:inline-flex;align-items:center;gap:6px;}
  .offline-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--salud);}

  /* ---------- Right-to-left (árabe) ---------- */
  [dir="rtl"] .card-bar{left:auto;right:0;}
  [dir="rtl"] .lang-menu{right:auto;left:18px;}
  [dir="rtl"] .card-chev svg,[dir="rtl"] .back svg{transform:scaleX(-1);}
  [dir="rtl"] .back{margin-left:0;margin-right:-2px;}
  [dir="rtl"] .pill{flex-direction:row-reverse;}

  /* ---------- Asistente ---------- */
  .fab{position:fixed;bottom:20px;right:max(18px,calc(50% - 240px + 18px));z-index:45;width:58px;height:58px;border-radius:50%;border:none;background:linear-gradient(160deg,var(--brand),var(--brand-deep));color:#fff;box-shadow:0 6px 20px rgba(10,61,59,.4);cursor:pointer;display:grid;place-items:center;transition:transform .12s ease;}
  .fab:active{transform:scale(.92);}
  .fab:focus-visible{outline:3px solid var(--brand);outline-offset:3px;}
  [dir="rtl"] .fab{right:auto;left:max(18px,calc(50% - 240px + 18px));}

  .assist-scrim{position:fixed;inset:0;background:rgba(15,25,23,.45);display:none;align-items:flex-end;justify-content:center;z-index:60;}
  .assist-scrim.open{display:flex;}
  .assist-panel{background:var(--bg);width:100%;max-width:480px;height:90vh;height:90dvh;border-radius:22px 22px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:sheetUp .26s ease both;}
  .assist-head{background:linear-gradient(160deg,var(--brand),var(--brand-deep));color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;display:flex;align-items:center;gap:11px;flex:none;}
  .assist-ico{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.16);display:grid;place-items:center;flex:none;}
  .assist-ico svg{width:19px;height:19px;}
  .assist-head .ttl{font-weight:700;font-size:1.08rem;flex:1;}
  .assist-close{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.16);color:#fff;cursor:pointer;display:grid;place-items:center;flex:none;}
  .assist-close svg{width:19px;height:19px;}
  .assist-disc{font-size:.8rem;color:var(--brand-deep);background:var(--brand-soft);padding:11px 16px;line-height:1.4;flex:none;}
  .assist-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px;}
  .msg{max-width:86%;padding:11px 14px;border-radius:16px;font-size:.95rem;line-height:1.45;}
  .msg.user{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:5px;}
  .msg.bot{align-self:flex-start;background:var(--card);border:1px solid var(--line);color:var(--ink);border-bottom-left-radius:5px;}
  .assist-result{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 12px;margin-top:9px;cursor:pointer;font-family:var(--font);color:var(--ink);box-shadow:var(--shadow);}
  .assist-result:active{transform:scale(.99);}
  .assist-result .ri{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none;}
  .assist-result .ri svg{width:20px;height:20px;}
  .assist-result .rt{flex:1;min-width:0;font-weight:600;font-size:.95rem;}
  .assist-result .ro{font-size:.8rem;font-weight:700;color:var(--brand);flex:none;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 14px 10px;flex:none;}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-size:.85rem;cursor:pointer;color:var(--ink);font-family:var(--font);}
  .chip:active{background:var(--bg);}
  .assist-input{display:flex;gap:8px;padding:12px;padding-bottom:calc(env(safe-area-inset-bottom) + 12px);border-top:1px solid var(--line);background:var(--bg);flex:none;}
  .assist-input input{flex:1;border:1px solid var(--line);border-radius:999px;padding:12px 16px;font-size:.95rem;font-family:var(--font);background:#fff;color:var(--ink);min-width:0;}
  .assist-input input:focus{outline:none;border-color:var(--brand);}
  .assist-send{width:46px;height:46px;border-radius:50%;border:none;background:var(--brand);color:#fff;cursor:pointer;display:grid;place-items:center;flex:none;}
  .assist-send svg{width:21px;height:21px;}
  [dir="rtl"] .msg.user{border-bottom-right-radius:16px;border-bottom-left-radius:5px;}
  [dir="rtl"] .msg.bot{border-bottom-left-radius:16px;border-bottom-right-radius:5px;}
  [dir="rtl"] .assist-result,[dir="rtl"] .assist-input input{text-align:right;}
  [dir="rtl"] .assist-send svg{transform:scaleX(-1);}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="topbar-row">
      <div class="brand-name">
        <span class="brand-mark" aria-hidden="true">
          <img src="logo-emblem.png" alt="" />
        </span>
        Casa Refugiados
      </div>
      <div class="topbar-actions">
        <button class="pill" id="langBtn" aria-haspopup="true" aria-expanded="false" aria-label="Cambiar idioma / Change language"><span id="langCode">ES</span> ▾</button>
        <button class="icon-btn" id="helpBtn" aria-label="Contacto y emergencias">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="19" height="19"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.7 2.34a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.74-1.27a2 2 0 0 1 2.11-.45c.74.34 1.53.57 2.34.7A2 2 0 0 1 22 16.92z"/></svg>
        </button>
      </div>
    </div>
    <div class="tagline" id="tagline"></div>
  </header>

  <nav class="lang-menu" id="langMenu" role="menu" aria-label="Idiomas"></nav>
  <main id="view" class="view" aria-live="polite"></main>

  <button class="fab" id="fab" aria-label="Asistente">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  </button>
</div>

<div class="scrim" id="scrim">
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle" id="sheet"></div>
</div>

<div class="assist-scrim" id="assistScrim">
  <div class="assist-panel" role="dialog" aria-modal="true" aria-label="Asistente">
    <div class="assist-head">
      <span class="assist-ico" id="assistIco"></span>
      <span class="ttl" id="assistTitle"></span>
      <button class="assist-close" id="assistClose" aria-label="Cerrar"></button>
    </div>
    <div class="assist-disc" id="assistDisc"></div>
    <div class="assist-msgs" id="assistMsgs"></div>
    <div class="chips" id="assistChips"></div>
    <div class="assist-input">
      <input id="assistField" type="text" autocomplete="off" />
      <button class="assist-send" id="assistSend"></button>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   CONEXIÓN CON GOOGLE SHEETS (horario de La Casita)
   ---------------------------------------------------------------------
   1. Crea una hoja de cálculo con esta primera fila (encabezados):
        dia | hora | actividad_es | actividad_en | actividad_fr | actividad_ht | actividad_ar | lugar
      - dia: número 1 a 7 (1 = lunes) o el nombre del día en español.
      - hora: por ejemplo  10:00
      - actividad_es es obligatoria. Las demás son opcionales: si están
        vacías, se mostrará el español.
      - lugar: opcional (por ejemplo "Salón principal").
   2. En Google Sheets:  Archivo → Compartir → Publicar en la web
      → elige la hoja → formato CSV → Publicar → copia el enlace.
   3. Pega ese enlace aquí abajo, entre las comillas.
      Mientras esté vacío, la app usa el horario de respaldo incluido.
   ===================================================================== */
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTwKzOjhHJUuBW2Z_R2Bbg8sH8HkKzAgIcX6MhrySvS6tJbsnX0MofKusxktOLIIKJtfkV9K1KWzmYm/pub?gid=0&single=true&output=csv";

/* =====================================================================
   CONTENIDO (textos en 4 idiomas: es, en, fr, ht)
   ===================================================================== */
const UI = {

/* ---------- Horario desde Google Sheets ---------- */
function parseCSV(text){
  const rows=[]; let row=[], field="", inQ=false, i=0;
  while(i < text.length){
    const ch = text[i];
    if(inQ){
      if(ch === '"'){ if(text[i+1] === '"'){ field+='"'; i+=2; continue; } inQ=false; i++; continue; }
      field += ch; i++; continue;
    } else {
      if(ch === '"'){ inQ=true; i++; continue; }
      if(ch === ','){ row.push(field); field=""; i++; continue; }
      if(ch === '\r'){ i++; continue; }
      if(ch === '\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
      field += ch; i++; continue;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows;
}

function dayIndex(v){
  const s = String(v||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(/^[1-7]$/.test(s)) return parseInt(s,10) - 1;
  const map = {lun:0,mon:0,mar:1,tue:1,mie:2,wed:2,jue:3,thu:3,vie:4,fri:4,sab:5,sat:5,dom:6,sun:6};
  for(const k in map){ if(s.startsWith(k)) return map[k]; }
  return -1;
}

function buildScheduleFromRows(rows){
  if(!rows || rows.length < 2) return null;
  const norm = s => String(s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const header = rows[0].map(norm);
  const col = name => header.indexOf(name);
  const cDia=col("dia"), cHora=col("hora"), cEs=col("actividad_es");
  if(cDia < 0 || cHora < 0 || cEs < 0) return null;
  const cEn=col("actividad_en"), cFr=col("actividad_fr"), cHt=col("actividad_ht"), cAr=col("actividad_ar"), cLug=col("lugar");
  const days = Array.from({length:7}, () => ({items:[]}));
  for(let r=1; r<rows.length; r++){
    const row = rows[r];
    const di = dayIndex(row[cDia]);
    const es = (row[cEs]||"").trim();
    if(di < 0 || !es) continue;
    days[di].items.push({
      h:(row[cHora]||"").trim(),
      t:{ es, en:(cEn>=0?row[cEn]:"").trim()||es, fr:(cFr>=0?row[cFr]:"").trim()||es, ht:(cHt>=0?row[cHt]:"").trim()||es, ar:(cAr>=0?row[cAr]:"").trim()||es },
      p:(cLug>=0?row[cLug]:"").trim()
    });
  }
  days.forEach(d => d.items.sort((a,b) => a.h.localeCompare(b.h)));
  return days;
}

async function loadSchedule(){
  if(!SHEET_CSV_URL) return;
  scheduleStatus = "loading";
  if(currentView === "comunidad") renderSeccion("comunidad");
  try{
    const res = await fetch(SHEET_CSV_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("fetch failed");
    const built = buildScheduleFromRows(parseCSV(await res.text()));
    if(built){ scheduleData = built; scheduleStatus = "live"; }
    else throw new Error("bad format");
  } catch(e){
    scheduleStatus = "cached"; // se queda con el horario de respaldo
  }
  if(currentView === "comunidad") renderSeccion("comunidad");
}

      ${l.label}${l.code === LANG ? '<span class="tick">✓</span>' : ''}
    </button>`).join('');
  menu.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => { setLang(b.dataset.lang); closeLangMenu(); });
  });
}

function setLang(code){
  LANG = code;
  document.documentElement.lang = code;
  document.documentElement.dir = (code === "ar") ? "rtl" : "ltr";
  document.getElementById('langCode').textContent = (LANGS.find(l => l.code === code)||{}).short || "ES";
  document.getElementById('tagline').textContent = t(UI.tagline);
  buildLangMenu();
  renderModal();
  if(typeof assistRefresh === "function") assistRefresh();
  if(currentView === "inicio") renderInicio(); else renderSeccion(currentView);
}

/* ---------- Modal de contacto ---------- */
function renderModal(){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h3>${t(UI.modalTitle)}</h3>
    <p>${t(UI.modalIntro)}</p>
    <a class="call-btn" href="tel:911">
      <span class="ic" style="background:#C0492F">${ICONS.phone}</span>
      <span class="lab"><span class="k">${t(UI.emergMx)}</span><span class="v">911</span></span>
    </a>
    <a class="call-btn" href="tel:+525561644818">
      <span class="ic" style="background:var(--brand)">${ICONS.phone}</span>
      <span class="lab"><span class="k">${t(UI.casaLabel)}</span><span class="v">55 6164 4818</span></span>
    </a>
    <button class="sheet-close" id="sheetClose">${t(UI.close)}</button>`;
  sheet.querySelector('#sheetClose').addEventListener('click', () => document.getElementById('scrim').classList.remove('open'));

/* ---------- Eventos ---------- */
const scrim = document.getElementById('scrim');
document.getElementById('helpBtn').addEventListener('click', () => scrim.classList.add('open'));
scrim.addEventListener('click', e => { if(e.target === scrim) scrim.classList.remove('open'); });
document.addEventListener('keydown', e => { if(e.key === 'Escape'){ scrim.classList.remove('open'); closeLangMenu(); closeAssist(); } });

document.getElementById('langBtn').addEventListener('click', e => {
  e.stopPropagation();
  const open = document.getElementById('langMenu').classList.contains('open');
  open ? closeLangMenu() : openLangMenu();
});
document.addEventListener('click', e => {
  if(!e.target.closest('#langMenu') && !e.target.closest('#langBtn')) closeLangMenu();
});

/* ---------- Asistente (búsqueda en el contenido) ---------- */
let assistMsgs = [];                 // {role:'user'|'bot', text} o {role:'bot', ids:[...]} o {role:'bot', none:true}
const assistScrim = document.getElementById('assistScrim');

const STOP = new Set(["un","una","uno","el","la","los","las","de","del","que","como","donde","para","por","con","mi","me","puedo","necesito","quiero","tengo","hay","es","en","the","an","need","want","where","can","how","do","my","is","to","of","for","and","or","je","une","le","les","des","ou","comment","pour","avec","mon","ma","ki","kote","mwen","nan","pou","ak","yon","cherche","busco"]);

function normalizeQ(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}
function tokenize(str){
  return normalizeQ(str).split(/[^a-z0-9\u0600-\u06ff]+/i).filter(Boolean);
}
function termMatch(term, tokenSet){
  if(tokenSet.has(term)) return true;
  for(const tok of tokenSet){
    const short = term.length <= tok.length ? term : tok;
    const long  = term.length <= tok.length ? tok : term;
    if(short.length >= 3 && long.length >= 4 && long.includes(short)) return true;
  }
  return false;
}
function assistSearch(query){
  const terms = tokenize(query).filter(x => x.length >= 2 && !STOP.has(x));
  if(!terms.length) return [];
  const scored = CONTENIDO.secciones.map(s => {
    const parts = [ t(s.titulo), t(s.desc), t(s.intro), s.titulo.es, s.desc.es, s.intro.es, (KEYWORDS[s.id]||[]).join(" ") ];
    if(s.enlaces) s.enlaces.forEach(e => { parts.push(t(e.titulo), t(e.desc), e.titulo.es, e.desc.es); });
    const tokenSet = new Set(tokenize(parts.join(" ")));
    let score = 0;
    terms.forEach(term => { if(termMatch(term, tokenSet)) score++; });
    return { id:s.id, score };
  }).filter(r => r.score > 0).sort((a,b) => b.score - a.score);
  return scored.slice(0, 3).map(r => r.id);
}

function assistSend(text){
  const q = (text || "").trim();
  if(!q) return;
  assistMsgs.push({ role:"user", text:q });
  const ids = assistSearch(q);
  if(ids.length) assistMsgs.push({ role:"bot", ids });
  else assistMsgs.push({ role:"bot", none:true });
  renderAssistMsgs();
}

function assistOpen(id){
  closeAssist();
  renderSeccion(id);
}

function renderAssistMsgs(){
  const box = document.getElementById('assistMsgs');
  let html = `<div class="msg bot">${t(ASSIST.intro)}</div>`;
  assistMsgs.forEach(m => {
    if(m.role === "user"){
      html += `<div class="msg user">${escapeHtml(m.text)}</div>`;
    } else if(m.none){
      html += `<div class="msg bot">${t(ASSIST.none)}</div>`;
    } else if(m.ids){
      let inner = `${t(ASSIST.found)}`;
      m.ids.forEach(id => {
        const s = CONTENIDO.secciones.find(x => x.id === id);
        if(!s) return;
        inner += `<button class="assist-result" onclick="assistOpen('${s.id}')">
          <span class="ri" style="background:${s.soft};color:${s.color}">${ICONS[s.icon]}</span>
          <span class="rt">${t(s.titulo)}</span>
          <span class="ro">${t(ASSIST.open)} →</span>
        </button>`;
      });
      html += `<div class="msg bot">${inner}</div>`;
    }
  });
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function assistRefresh(){
  document.getElementById('assistIco').innerHTML = ICONS.chat;
  document.getElementById('assistTitle').textContent = t(ASSIST.title);
  document.getElementById('assistClose').innerHTML = ICONS.close;
  document.getElementById('assistDisc').textContent = t(ASSIST.intro);
  document.getElementById('assistField').placeholder = t(ASSIST.placeholder);
  const sendBtn = document.getElementById('assistSend');
  sendBtn.innerHTML = ICONS.send;
  sendBtn.setAttribute('aria-label', t(ASSIST.sendAria));
  const chips = document.getElementById('assistChips');
  chips.innerHTML = SUGGEST.map((s,i) => `<button class="chip" data-i="${i}">${t(s)}</button>`).join('');
  chips.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => assistSend(t(SUGGEST[+c.dataset.i])));
  });
  renderAssistMsgs();
}

function openAssist(){ assistScrim.classList.add('open'); document.getElementById('assistField').focus(); }
function closeAssist(){ assistScrim.classList.remove('open'); }

document.getElementById('fab').addEventListener('click', openAssist);
document.getElementById('assistClose').addEventListener('click', closeAssist);
assistScrim.addEventListener('click', e => { if(e.target === assistScrim) closeAssist(); });
document.getElementById('assistSend').addEventListener('click', () => {
  const f = document.getElementById('assistField');
  assistSend(f.value); f.value = "";
});
document.getElementById('assistField').addEventListener('keydown', e => {
  if(e.key === "Enter"){ const f = e.target; assistSend(f.value); f.value = ""; }
});

/* ---------- Arranque ---------- */
(function init(){
  const sys = (navigator.language || "es").slice(0,2).toLowerCase();
  const supported = LANGS.map(l => l.code);
  setLang(supported.includes(sys) ? sys : "es");
  renderInicio();
  loadSchedule();
})();

/* ---------- Service worker (funcionamiento sin conexión) ---------- */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
